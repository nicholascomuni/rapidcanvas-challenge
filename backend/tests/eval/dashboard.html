<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eval Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; padding: 2rem; }
  h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.25rem; }
  .subtitle { color: #64748b; font-size: 0.85rem; margin-bottom: 2rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
  .card { background: #1e2130; border-radius: 10px; padding: 1.2rem; }
  .card-label { font-size: 0.72rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
  .card-value { font-size: 2rem; font-weight: 700; }
  .bar-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; }
  .bar-label { font-size: 0.78rem; color: #94a3b8; width: 200px; flex-shrink: 0; }
  .bar-track { flex: 1; background: #2d3148; border-radius: 4px; height: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
  .bar-num { font-size: 0.78rem; color: #e2e8f0; width: 36px; text-align: right; flex-shrink: 0; }
  .section-title { font-size: 0.9rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; margin: 2rem 0 1rem; }
  .case-card { background: #1e2130; border-radius: 10px; padding: 1.2rem; margin-bottom: 1rem; }
  .case-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; cursor: pointer; user-select: none; }
  .case-id { font-size: 0.78rem; font-family: monospace; color: #64748b; }
  .case-score { font-size: 1.1rem; font-weight: 700; }
  .skipped { color: #475569; font-style: italic; font-size: 0.85rem; }
  .dim-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 0.5rem 1.5rem; }
  .dim-reason { font-size: 0.72rem; color: #64748b; margin-top: 0.15rem; line-height: 1.4; }
  .bullets-section { margin-top: 1rem; border-top: 1px solid #2d3148; padding-top: 0.75rem; }
  .bullet { font-size: 0.82rem; color: #94a3b8; line-height: 1.5; margin-bottom: 0.3rem; padding-left: 1rem; position: relative; }
  .bullet::before { content: "•"; position: absolute; left: 0; color: #475569; }
  .conclusion-box { background: #1e2130; border-left: 3px solid #6366f1; border-radius: 0 10px 10px 0; padding: 1.2rem 1.5rem; font-size: 0.88rem; line-height: 1.7; color: #cbd5e1; margin-bottom: 2rem; }
  .drop-zone { border: 2px dashed #2d3148; border-radius: 10px; padding: 3rem; text-align: center; color: #475569; font-size: 0.9rem; cursor: pointer; transition: border-color 0.2s; }
  .drop-zone:hover, .drop-zone.over { border-color: #6366f1; color: #6366f1; }
  .tag { display: inline-block; font-size: 0.68rem; padding: 0.15rem 0.5rem; border-radius: 4px; margin-left: 0.5rem; vertical-align: middle; }
  .tag-pass { background: #14532d; color: #86efac; }
  .tag-skip { background: #1e293b; color: #64748b; }
  details > summary { list-style: none; }
  details > summary::-webkit-details-marker { display: none; }
  .chevron { font-size: 0.7rem; color: #475569; transition: transform 0.2s; }
  details[open] .chevron { transform: rotate(90deg); }
</style>
</head>
<body>

<div id="app">
  <div class="drop-zone" id="drop" onclick="document.getElementById('file-input').click()">
    <div style="font-size:2rem;margin-bottom:0.5rem">📊</div>
    Drop <code>eval_report.json</code> here or click to open
    <input type="file" id="file-input" accept=".json" style="display:none">
  </div>
</div>

<script>
const JUDGE_DIMS = [
  "explanation_relevance","faithfulness","groundedness",
  "completeness","clarity","context_relevance","search_query_relevance"
];

const EMB_METRICS = [
  ["bullets_explanation_similarity", "Explanation Similarity"],
  ["bullets_context_similarity",     "Context Similarity"],
  ["search_query_similarity",        "Query Similarity"],
  ["citation",                       "Citation Rate"],
  ["bullet_count",                   "Bullet Count"],
  ["judge_score",                    "Judge Score (overall)"],
];

function color(v, max=1) {
  const r = v / max;
  if (r >= 0.75) return "#22c55e";
  if (r >= 0.5)  return "#eab308";
  return "#ef4444";
}

function bar(v, max=1, label) {
  if (v == null) return `<div class="bar-row"><span class="bar-label">${label}</span><span style="font-size:.75rem;color:#475569">N/A</span></div>`;
  const pct = Math.min(100, (v / max) * 100).toFixed(1);
  const c = color(v, max);
  return `
    <div class="bar-row">
      <span class="bar-label">${label}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${c}"></div></div>
      <span class="bar-num" style="color:${c}">${typeof v==='number'?v.toFixed(2):v}</span>
    </div>`;
}

function renderAggregate(agg) {
  const cards = EMB_METRICS.map(([k, label]) => {
    const v = agg[k];
    if (v == null) return '';
    const c = color(v);
    return `<div class="card"><div class="card-label">${label}</div><div class="card-value" style="color:${c}">${v.toFixed(3)}</div></div>`;
  }).join('');

  const bars = EMB_METRICS.map(([k, label]) => bar(agg[k], 1, label)).join('');

  return `<div class="grid">${cards}</div><div class="card" style="margin-bottom:2rem">${bars}</div>`;
}

function renderJudgeDims(detail) {
  if (!detail) return '';
  return `<div class="dim-grid">` + JUDGE_DIMS.map(dim => {
    const entry = detail[dim];
    if (!entry) return '';
    const score = typeof entry === 'object' ? entry.score : entry;
    const reason = typeof entry === 'object' ? (entry.reason || '') : '';
    const c = color(score, 5);
    const pct = ((score / 5) * 100).toFixed(1);
    return `
      <div>
        <div class="bar-row">
          <span class="bar-label" style="width:160px">${dim.replace(/_/g,' ')}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${c}"></div></div>
          <span class="bar-num" style="color:${c}">${score}/5</span>
        </div>
        ${reason ? `<div class="dim-reason" style="padding-left:160px">${reason}</div>` : ''}
      </div>`;
  }).join('') + `</div>`;
}

function renderCase(r) {
  if (r.skipped) {
    return `<div class="case-card"><div class="case-header"><span class="case-id">${r.id}</span><span class="skipped">skipped</span></div></div>`;
  }

  const js = r.judge_score ?? 0;
  const jc = color(js);

  const embBars = [
    ["bullets_explanation_similarity","Explanation Sim"],
    ["bullets_context_similarity","Context Sim"],
    ["search_query_similarity","Query Sim"],
    ["citation","Citation"],
    ["bullet_count","Bullet Count"],
  ].map(([k,l]) => bar(r[k], 1, l)).join('');

  const bullets = (r.bullets || []).map(b => `<div class="bullet">${b}</div>`).join('');

  return `
    <div class="case-card">
      <details>
        <summary>
          <div class="case-header">
            <div>
              <span class="case-id">${r.id}</span>
              <span class="tag tag-pass">live</span>
            </div>
            <div style="display:flex;align-items:center;gap:1rem">
              <span style="font-size:.78rem;color:#64748b">judge</span>
              <span class="case-score" style="color:${jc}">${js.toFixed(2)}</span>
              <span class="chevron">▶</span>
            </div>
          </div>
        </summary>

        <div style="margin-bottom:1rem">${embBars}</div>

        <div class="section-title" style="margin-top:0.5rem">Judge dimensions</div>
        ${renderJudgeDims(r.judge_detail)}

        ${bullets ? `<div class="bullets-section"><div class="section-title" style="margin-top:0">Generated bullets</div>${bullets}</div>` : ''}
      </details>
    </div>`;
}

function render(data) {
  const agg = data.aggregate || {};
  const cases = data.cases || [];
  const conclusion = data.conclusion || '';
  const skipped = cases.filter(c => c.skipped).length;
  const active = cases.length - skipped;

  document.getElementById('app').innerHTML = `
    <h1>Eval Dashboard</h1>
    <div class="subtitle">${active} active · ${skipped} skipped · ${cases.length} total cases</div>

    ${conclusion ? `
      <div class="section-title">Conclusion</div>
      <div class="conclusion-box">${conclusion}</div>
    ` : ''}

    <div class="section-title">Aggregate metrics</div>
    ${renderAggregate(agg)}

    <div class="section-title">Cases</div>
    ${cases.map(renderCase).join('')}
  `;
}

// File input
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => render(JSON.parse(ev.target.result));
  reader.readAsText(file);
});

// Drag and drop
const drop = document.getElementById('drop');
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
drop.addEventListener('dragleave', () => drop.classList.remove('over'));
drop.addEventListener('drop', e => {
  e.preventDefault();
  drop.classList.remove('over');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => render(JSON.parse(ev.target.result));
  reader.readAsText(file);
});
</script>
</body>
</html>
